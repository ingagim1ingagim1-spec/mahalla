<!DOCTYPE html>
<html lang="sq">
<head>        
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjeneza Familjare - Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body{font-family:sans-serif;background:#f0f2f5;padding:20px;color:#1c1e21;}
        .container{max-width:1000px;margin:auto;}
        
        /* LOGIN STILI */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1e21; display: flex; align-items: center; justify-content: center;
            z-index: 9999; color: white;
        }
        .login-box { background: #fff; padding: 30px; border-radius: 12px; color: #333; width: 300px; text-align: center; }
        
        .card{background:white;padding:25px;border-radius:12px;box-shadow:0 2px 15px rgba(0,0,0,0.08);margin-bottom:20px;}
        label{display:block;margin-bottom:5px;font-weight:bold;color:#4b4f56;}
        input, textarea{width:100%;padding:12px;margin-bottom:15px;border-radius:8px;border:1px solid #dddfe2;box-sizing:border-box;}
        .btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:0.2s;}
        .btn-save{background:#1877f2;color:white;}
        .btn-edit{background:#e4e6eb;color:#050505;}
        .btn-delete{background:#fa3e3e;color:white;}
        .btn-add{background:#27ae60;color:white;}
        .btn-tree{background:#8e44ad;color:white;}

        .form-children-section{border:2px dashed #3498db; padding:15px; border-radius:10px; background:#f8faff; margin-bottom:20px;}
        .child-form-row{background:white; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #d1d9e6; position:relative;}
        
        .member-item{background:white;padding:20px;border-radius:12px;margin-bottom:20px;border:1px solid #dddfe2;}
        .member-header{display:flex;gap:20px;align-items:center;border-bottom:1px solid #eee;padding-bottom:15px;}
        .member-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #1877f2;}
        .child-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));gap:15px;margin-top:15px;}
        .child-item{background:#f7f8fa;padding:12px;border-radius:10px;display:flex;align-items:center;gap:12px;border:1px solid #e4e6eb;}
        .child-photo-small{width:50px;height:50px;border-radius:50%;object-fit:cover;}

        #childModal, #treeModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000; overflow-y: auto;}
        .modal-content{background:white;width:90%;max-width:450px;margin:30px auto;padding:25px;border-radius:15px;}
        .tree-modal-content{background:white;width:95%;max-width:800px;margin:30px auto;padding:25px;border-radius:15px;}
        
        .search-bar{background:#1c1e21;padding:20px;border-radius:12px;margin-bottom:25px;}
        .search-bar input{margin-bottom:0;background:white;font-size:1.1em;}
        .hidden{display:none;}
        .history-text{font-size: 0.9em; color: #606770; margin-top: 5px; font-style: italic;}

        /* Tree View Styles */
        .tree-branch { margin-left: 20px; border-left: 2px solid #ddd; padding-left: 15px; margin-top: 10px; }
        .tree-node { margin-bottom: 10px; padding: 5px; background: #f9f9f9; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>🔐 Kyçja në Sistem</h3>
        <input type="text" id="user" placeholder="Përdoruesi (admin)">
        <input type="password" id="pass" placeholder="Fjalëkalimi">
        <button class="btn btn-save" style="width:100%" onclick="checkLogin()">Hyr</button>
        <p id="errorMsg" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div style="display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2>🌳 Menaxhimi i Gjenezës</h2>
        <div>
            <button class="btn btn-tree" onclick="openTreeView()">🌳 Pamja Degëzuar</button>
            <button class="btn btn-delete" onclick="location.reload()" style="padding:5px 10px;">Dil (Logout)</button>
        </div>
    </div>

    <div class="card">
        <form id="familyForm">
            <input type="hidden" id="editId">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <input type="text" id="fullname" placeholder="Emri & Mbiemri" required>
                <input type="text" id="personalNo" placeholder="Nr. Personal">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <input type="date" id="dob">
                <input type="text" id="birthplace" placeholder="Vendlindja">
            </div>
            <input type="text" id="spouse" placeholder="Bashkëshorti/ja">
            <textarea id="history" placeholder="Historiku i familjes (biografia)..." rows="3"></textarea>
            
            <label>Foto Kryefamiljarit</label>
            <input type="file" id="photoInput" accept="image/*">

            <div class="form-children-section">
                <label style="color:#3498db;">👶 Shto Fëmijët</label>
                <div id="formChildrenList"></div>
                <button type="button" class="btn btn-add" onclick="addChildRow()">+ Shto Fëmijë</button>
            </div>

            <button type="submit" class="btn btn-save" id="mainSubmitBtn" style="width:100%;">Ruaj në Cloud</button>
            <button type="button" id="cancelBtn" class="btn hidden" onclick="resetForm()">Anulo</button>
        </form>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Kërko..." onkeyup="searchGlobal()">
    </div>

    <div id="treeDisplay"></div>
</div>

<script>
    // Funksioni i Login-it i rregulluar që të punojë kudo
    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const error = document.getElementById('errorMsg');

        // Të dhënat standarde për hyrje
        if (u === "admin" && p === "gjeneza2024") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } else {
            error.innerText = "Përdoruesi ose fjalëkalimi i gabuar!";
        }
    }

    // Funksioni për PDF
    function downloadPDF() {
        const element = document.getElementById('printableArea');
        html2pdf().from(element).save('Gjeneza_Familjare.pdf');
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAe98zkkYvHxabF2lqYbvrAJUa_zOvwxMU",
      authDomain: "gjenezafamiljareekrumve.firebaseapp.com",
      databaseURL: "https://gjenezafamiljareekrumve-default-rtdb.europe-west1.firebasedatabase.app/", 
      projectId: "gjenezafamiljareekrumve",
      storageBucket: "gjenezafamiljareekrumve.firebasestorage.app",
      messagingSenderId: "637185266366",
      appId: "1:637185266366:web:59a79d04362ffb9115c4ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    window.db = db;

    // Ngarkimi i të dhënave
    onValue(ref(db, 'anetaret/'), (snapshot) => {
        window.familyData = snapshot.val() ? Object.values(snapshot.val()) : [];
        // Thirr funksionin për render
        if(typeof renderTree === 'function') renderTree(window.familyData);
    });

    // Ruajtja në Firebase
    document.getElementById('familyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const id = editId || 'fam_' + Date.now();
        
        const children = [];
        document.querySelectorAll('.child-form-row').forEach(row => {
            const name = row.querySelector('.c-name').value;
            if(name) children.push({ name: name, dob: row.querySelector('.c-dob').value, photo: row.querySelector('.c-preview').src });
        });

        const data = {
            id: id,
            name: document.getElementById('fullname').value,
            personalNo: document.getElementById('personalNo').value,
            dob: document.getElementById('dob').value,
            photo: window.currentPhotoBase64 || 'https://via.placeholder.com/100',
            children: children
        };

        await set(ref(db, 'anetaret/' + id), data);
        location.reload(); // Rifresko faqe pas ruajtjes
    });
</script>

</body>
</html>
